<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f0e;--surface:#161918;--surface2:#1d201f;--border:#2a2d2c;
  --text:#f5f3ee;--text2:#a8a69e;--text3:#706e68;
  --teal:#1e6b54;--teal-light:#2e8b70;--gold:#c9a84c;
  --font-display:'Playfair Display',serif;--font-body:'Barlow',sans-serif;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* HERO */
.hero{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px 60px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 80%,rgba(30,107,84,.12),transparent 70%)}
.hero-logo{width:100px;height:100px;border-radius:50%;margin-bottom:24px;border:2px solid var(--gold);object-fit:cover}
.hero h1{font-family:var(--font-display);font-size:clamp(2.2rem,5vw,3.8rem);font-weight:900;letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.hero h1 span{color:var(--gold)}
.hero p{font-size:1.05rem;color:var(--text2);max-width:520px;font-weight:300}
.hero-cta{display:inline-flex;align-items:center;gap:8px;margin-top:32px;padding:14px 36px;background:var(--teal);color:#fff;text-decoration:none;border-radius:40px;font-weight:600;font-size:.95rem;transition:.2s}
.hero-cta:hover{background:var(--teal-light);transform:translateY(-2px)}

/* NAV */
.filter-bar{display:flex;justify-content:center;gap:8px;padding:24px 20px;flex-wrap:wrap;position:sticky;top:0;z-index:10;background:rgba(13,15,14,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.filter-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font-body);font-size:.82rem;font-weight:500;cursor:pointer;transition:.2s;letter-spacing:.02em}
.filter-btn:hover{border-color:var(--text2);color:var(--text)}
.filter-btn.active{background:var(--teal);border-color:var(--teal);color:#fff}

/* GRID */
.portfolio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding:32px 24px;max-width:1400px;margin:0 auto}
@media(max-width:600px){.portfolio-grid{grid-template-columns:1fr;padding:16px 12px;gap:12px}}

.project-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.25s ease}
.project-card:hover{border-color:var(--teal);transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.project-thumb{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--surface2)}
.project-body{padding:16px 18px}
.project-name{font-family:var(--font-display);font-size:1.15rem;font-weight:700;margin-bottom:4px}
.project-meta{font-size:.78rem;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.project-tag{display:inline-flex;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600;background:rgba(30,107,84,.15);color:var(--teal-light);letter-spacing:.03em}
.project-services{font-size:.8rem;color:var(--text2);margin-top:6px}

/* EMPTY */
.empty{text-align:center;padding:80px 24px;color:var(--text3);font-size:1rem}
.empty-icon{font-size:3rem;margin-bottom:12px}

/* FOOTER */
.footer{text-align:center;padding:48px 24px;border-top:1px solid var(--border);margin-top:48px}
.footer-brand{font-family:var(--font-display);font-size:1.4rem;font-weight:700;color:var(--gold);margin-bottom:8px}
.footer-contact{font-size:.85rem;color:var(--text3);margin-bottom:6px}
.footer-contact a{color:var(--text2);text-decoration:none}
.footer-contact a:hover{color:var(--text)}
.footer-copy{font-size:.72rem;color:var(--text3);margin-top:16px}

/* LIGHTBOX */
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.lightbox-overlay.active{display:flex}
.lightbox-content{max-width:900px;width:100%;background:var(--surface);border-radius:14px;overflow:hidden;position:relative}
.lightbox-close{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:1.2rem;cursor:pointer;z-index:2;display:flex;align-items:center;justify-content:center}
.lightbox-media{width:100%;aspect-ratio:16/9;background:#000}
.lightbox-media iframe,.lightbox-media img{width:100%;height:100%;object-fit:cover;border:none}
.lightbox-info{padding:20px 24px}
.lightbox-title{font-family:var(--font-display);font-size:1.3rem;font-weight:700;margin-bottom:6px}
.lightbox-detail{font-size:.85rem;color:var(--text2);margin-bottom:4px}
.lightbox-link{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:10px 24px;background:var(--teal);color:#fff;text-decoration:none;border-radius:8px;font-weight:600;font-size:.85rem;transition:.2s}
.lightbox-link:hover{background:var(--teal-light)}

/* LOADING */
.loading{text-align:center;padding:80px 24px;color:var(--text3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function sbFetch(method, table, body, params) {
  var url = SUPABASE_URL + '/rest/v1/' + table + (params || '');
  var opts = {
    method: method, headers: {
      'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json', 'Prefer': 'return=representation'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(function(r){ return r.json(); });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function loadPortfolio() {
  // Load from Supabase portal_data with featured shoots
  // Fallback: load from localStorage leads data
  try {
    var leadsRaw = localStorage.getItem('reel_estate_leads');
    if (leadsRaw) {
      var leads = JSON.parse(leadsRaw);
      portfolioItems = [];
      leads.forEach(function(l) {
        (l.shoots || []).forEach(function(s) {
          if (s.featured) {
            portfolioItems.push({
              id: s.id,
              projectName: s.projectName || 'Project',
              client: l.name || '',
              brokerage: l.brokerage || '',
              address: s.address || '',
              type: s.type || 'Photography',
              date: s.date || '',
              status: s.status || '',
              driveLink: s.driveLink || '',
              portalUrl: s.portalUrl || '',
              versions: s.versions || [],
              photosFolder: s.photosFolder || ''
            });
          }
        });
      });
    }
  } catch(e) { console.warn('Could not load local data', e); }

  // Also try Supabase
  sbFetch('GET', 'leads', null, '?select=*')
    .then(function(rows) {
      if (!rows || !rows.length) { renderPortfolio(); return; }
      rows.forEach(function(row) {
        var data = row.data || row;
        var l = data;
        (l.shoots || []).forEach(function(s) {
          if (s.featured && !portfolioItems.find(function(p){ return p.id === s.id; })) {
            portfolioItems.push({
              id: s.id,
              projectName: s.projectName || 'Project',
              client: l.name || '',
              brokerage: l.brokerage || '',
              address: s.address || '',
              type: s.type || 'Photography',
              date: s.date || '',
              status: s.status || '',
              driveLink: s.driveLink || '',
              portalUrl: s.portalUrl || '',
              versions: s.versions || [],
              photosFolder: s.photosFolder || ''
            });
          }
        });
      });
      renderPortfolio();
    })
    .catch(function(e) {
      console.warn('Supabase load failed, using local data', e);
      renderPortfolio();
    });
}

function renderPortfolio() {
  var content = document.getElementById('portfolio-content');

  // Build category filter buttons
  var categories = {};
  portfolioItems.forEach(function(p) { if (p.type) categories[p.type] = true; });
  var bar = document.getElementById('filter-bar');
  bar.innerHTML = '<button class="filter-btn active" onclick="filterCategory(\'all\')">All</button>';
  Object.keys(categories).forEach(function(cat) {
    bar.innerHTML += '<button class="filter-btn" onclick="filterCategory(\'' + esc(cat) + '\')">' + esc(cat) + '</button>';
  });

  var filtered = currentFilter === 'all' ? portfolioItems : portfolioItems.filter(function(p){ return p.type === currentFilter; });

  if (!filtered.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">📷</div>Portfolio coming soon — featured projects will appear here.</div>';
    return;
  }

  var html = '<div class="portfolio-grid">';
  filtered.forEach(function(p, i) {
    var videoThumb = '';
    if (p.versions && p.versions.length) {
      var lastVer = p.versions[p.versions.length-1];
      var ytId = extractYTId(lastVer.url);
      if (ytId) videoThumb = 'https://img.youtube.com/vi/' + ytId + '/hqdefault.jpg';
    }
    html += '<div class="project-card" onclick="openLightbox(' + i + ')">'
      + (videoThumb ? '<img class="project-thumb" src="' + esc(videoThumb) + '" alt="' + esc(p.projectName) + '">' : '<div class="project-thumb" style="display:flex;align-items:center;justify-content:center;font-size:3rem;color:var(--text3)">📸</div>')
      + '<div class="project-body">'
      + '<div class="project-name">' + esc(p.projectName || p.address || 'Project') + '</div>'
      + '<div class="project-meta">'
      + (p.client ? '<span>' + esc(p.client) + '</span>' : '')
      + (p.brokerage ? '<span>' + esc(p.brokerage) + '</span>' : '')
      + (p.date ? '<span>' + p.date + '</span>' : '')
      + '</div>'
      + (p.type ? '<span class="project-tag">' + esc(p.type) + '</span>' : '')
      + (p.address ? '<div class="project-services">📍 ' + esc(p.address) + '</div>' : '')
      + '</div></div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(function(b) {
    b.classList.toggle('active', (cat === 'all' && b.textContent === 'All') || b.textContent === cat);
  });
  renderPortfolio();
}

function extractYTId(url) {
  if (!url) return null;
  var m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([\w-]{11})/);
  return m ? m[1] : null;
}

function openLightbox(idx) {
  var filtered = currentFilter === 'all' ? portfolioItems : portfolioItems.filter(function(p){ return p.type === currentFilter; });
  var p = filtered[idx];
  if (!p) return;

  var mediaEl = document.getElementById('lb-media');
  var ytId = null;
  if (p.versions && p.versions.length) ytId = extractYTId(p.versions[p.versions.length-1].url);

  if (ytId) {
    mediaEl.innerHTML = '<iframe src="https://www.youtube.com/embed/' + ytId + '?rel=0" allowfullscreen></iframe>';
  } else {
    mediaEl.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:4rem;color:var(--text3)">📸</div>';
  }

  document.getElementById('lb-title').textContent = p.projectName || p.address || 'Project';
  var detail = '';
  if (p.client) detail += p.client;
  if (p.brokerage) detail += ' · ' + p.brokerage;
  if (p.address) detail += ' · 📍 ' + p.address;
  if (p.date) detail += ' · ' + p.date;
  document.getElementById('lb-detail').textContent = detail;

  var actions = '';
  if (p.portalUrl) actions += '<a class="lightbox-link" href="' + esc(p.portalUrl) + '" target="_blank">🔗 View Full Gallery</a> ';
  if (p.photosFolder) actions += '<a class="lightbox-link" href="' + esc(p.photosFolder) + '" target="_blank" style="background:var(--gold)">📁 Photos</a>';
  document.getElementById('lb-actions').innerHTML = actions;

  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lb-media').innerHTML = '';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

loadPortfolio();
</script>
</body>
</html>
